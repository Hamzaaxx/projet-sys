# canaryfs configuration file
# This file is automatically loaded at startup.
# Command-line flags (e.g. -l, -p, -a) always take priority.

# Where the log file is stored (default: /var/log/canaryfs)
LOG_DIR="/var/log/canaryfs"

# How many canary files to plant by default (overridable with -p)
CANARY_COUNT=10

# Send syslog + desktop notifications by default (true|false)
ALERT_MODE=false

# Where the canary registry file is kept
CANARY_REGISTRY="/tmp/.canaryfs_registry"
